name: collabrains

networks:
  collabrains-net:
    driver: bridge

volumes:
  postgres_data:
  ldap_data:
  redis_data:
  es_data:
  ollama_data:
  paperless_data:
  paperless_media:
  paperless_export:
  paperless_consume:

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [collabrains-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [collabrains-net]

  openldap:
    build: ./infra/ldap
    restart: unless-stopped
    environment:
      LDAP_BASE_DN: dc=collabrains,dc=eu
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
    volumes:
      - ldap_data:/var/lib/ldap
      - ./infra/ldap/bootstrap:/ldifs:ro
    ports:
      - "127.0.0.1:389:389"
    networks: [collabrains-net]

  api:
    build: ./services/api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      LDAP_URL: ${LDAP_URL}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_BIND_DN_TEMPLATE: ${LDAP_BIND_DN_TEMPLATE}
      LDAP_ADMIN_GROUP_DN: ${LDAP_ADMIN_GROUP_DN}
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openldap:
        condition: service_started
    networks: [collabrains-net]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    depends_on:
      - api
    networks: [collabrains-net]

  # --- Phase 1+: enable with `docker compose --profile full up` ---
  elasticsearch:
    image: docker.elasticsearch.co/elasticsearch/elasticsearch:8.15.0
    restart: unless-stopped
    profiles: ["full"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [collabrains-net]

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["full"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks: [collabrains-net]

  # Same `ollama` service with GPU reservation — use instead of the CPU
  # service above via `docker compose --profile gpu up ollama-gpu`.
  ollama-gpu:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["gpu"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [collabrains-net]

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    profiles: ["full"]
    environment:
      PAPERLESS_REDIS: redis://redis:6379/1
      PAPERLESS_OCR_LANGUAGE: eng+nld+deu
      PAPERLESS_OCR_LANGUAGES: nld deu
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_URL: ${PAPERLESS_URL}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_export:/usr/src/paperless/export
      - paperless_consume:/usr/src/paperless/consume
    ports:
      - "8010:8000"
    depends_on:
      - redis
    networks: [collabrains-net]

  # --- Phase 3: Signal bot, disabled until a phone number is provisioned ---
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    profiles: ["signal"]
    environment:
      MODE: native
    volumes:
      - ./infra/signal-cli:/home/.local/share/signal-cli
    ports:
      - "8011:8080"
    networks: [collabrains-net]

  signal-bot:
    build: ./apps/signal-bot
    restart: unless-stopped
    profiles: ["signal"]
    env_file: .env
    depends_on:
      - api
      - signal-cli
    networks: [collabrains-net]
